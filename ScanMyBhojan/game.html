<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanMyBhojan - 3D Food Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        .header h1 {
            font-size: 4rem;
            font-weight: 800;
            color: white;
            letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 1s ease-out;
        }

        .instructions {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        .instructions p {
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .nutrition-modal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease-out;
        }

        .nutrition-content {
            position: relative;
            padding: 3rem;
            border-radius: 2rem;
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.3s ease-out;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .food-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .food-title h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .divider {
            width: 80px;
            height: 4px;
            background: white;
            margin: 0 auto;
            border-radius: 2px;
            opacity: 0.4;
        }

        .calories-box {
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .calories-value {
            font-size: 4rem;
            font-weight: 900;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.2);
        }

        .calories-label {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            opacity: 0.8;
            letter-spacing: 2px;
        }

        .nutrients-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .nutrient-item {
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.3s ease;
        }

        .nutrient-item:hover {
            transform: translateY(-5px);
        }

        .nutrient-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .nutrient-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            opacity: 0.8;
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
        }

        .footer-text p {
            font-size: 0.85rem;
            color: white;
            opacity: 0.6;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }

            .instructions p {
                font-size: 0.9rem;
            }

            .nutrition-content {
                padding: 2rem;
            }

            .food-title h2 {
                font-size: 2rem;
            }

            .calories-value {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="header">
        <h1>ScanMyBhojan</h1>
    </div>

    <div class="instructions">
        <p>🍎 Drag food items onto the plate to scan nutrition 🍕</p>
    </div>

    <div id="nutrition-modal" class="nutrition-modal hidden">
        <div class="nutrition-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            
            <div class="food-title">
                <h2 id="food-name"></h2>
                <div class="divider"></div>
            </div>

            <div class="calories-box">
                <div class="calories-value" id="calories-value"></div>
                <div class="calories-label">CALORIES</div>
            </div>

            <div class="nutrients-grid">
                <div class="nutrient-item">
                    <div class="nutrient-value" id="protein-value"></div>
                    <div class="nutrient-label">Protein</div>
                </div>
                <div class="nutrient-item">
                    <div class="nutrient-value" id="carbs-value"></div>
                    <div class="nutrient-label">Carbs</div>
                </div>
                <div class="nutrient-item">
                    <div class="nutrient-value" id="fat-value"></div>
                    <div class="nutrient-label">Fat</div>
                </div>
                <div class="nutrient-item">
                    <div class="nutrient-value" id="fiber-value"></div>
                    <div class="nutrient-label">Fiber</div>
                </div>
            </div>

            <div class="footer-text">
                <p>Click anywhere to close</p>
            </div>
        </div>
    </div>

    <script>
        const foodDatabase = {
            apple: { name: 'Apple', calories: 95, protein: '0.5g', carbs: '25g', fat: '0.3g', fiber: '4g' },
            banana: { name: 'Banana', calories: 105, protein: '1.3g', carbs: '27g', fat: '0.4g', fiber: '3g' },
            orange: { name: 'Orange', calories: 62, protein: '1.2g', carbs: '15g', fat: '0.2g', fiber: '3g' },
            burger: { name: 'Burger', calories: 540, protein: '25g', carbs: '45g', fat: '25g', fiber: '2g' },
            pizza: { name: 'Pizza Slice', calories: 285, protein: '12g', carbs: '36g', fat: '10g', fiber: '2g' },
            salad: { name: 'Salad Bowl', calories: 150, protein: '8g', carbs: '12g', fat: '8g', fiber: '5g' }
        };

        function showNutrition(foodType) {
            const food = foodDatabase[foodType];
            document.getElementById('food-name').textContent = food.name;
            document.getElementById('calories-value').textContent = food.calories;
            document.getElementById('protein-value').textContent = food.protein;
            document.getElementById('carbs-value').textContent = food.carbs;
            document.getElementById('fat-value').textContent = food.fat;
            document.getElementById('fiber-value').textContent = food.fiber;
            document.getElementById('nutrition-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('nutrition-modal').classList.add('hidden');
        }

        document.getElementById('nutrition-modal').addEventListener('click', (e) => {
            if (e.target.id === 'nutrition-modal') {
                closeModal();
            }
        });

        // Three.js Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x667eea, 10, 50);
        scene.background = new THREE.Color(0x667eea);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(-5, 5, 5);
        scene.add(pointLight);

        // Plate
        const plateGeometry = new THREE.CylinderGeometry(3, 3, 0.3, 64);
        const plateMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            roughness: 0.2, 
            metalness: 0.1 
        });
        const plate = new THREE.Mesh(plateGeometry, plateMaterial);
        plate.position.y = 0;
        plate.castShadow = true;
        plate.receiveShadow = true;
        scene.add(plate);

        // Plate rim
        const rimGeometry = new THREE.TorusGeometry(3, 0.15, 32, 100);
        const rimMaterial = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.3 });
        const rim = new THREE.Mesh(rimGeometry, rimMaterial);
        rim.position.y = 0.15;
        rim.rotation.x = Math.PI / 2;
        scene.add(rim);

        // Ground
        const groundGeometry = new THREE.PlaneGeometry(50, 50);
        const groundMaterial = new THREE.ShadowMaterial({ opacity: 0.15 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        const foodItems = [];
        const foodPhysics = [];

        // Create Apple
        const appleGroup = new THREE.Group();
        const appleGeometry = new THREE.SphereGeometry(0.6, 64, 64);
        appleGeometry.scale(1, 0.95, 1);
        const appleMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xff3333, 
            roughness: 0.4, 
            metalness: 0.1 
        });
        const apple = new THREE.Mesh(appleGeometry, appleMaterial);
        apple.castShadow = true;
        
        const stemGeometry = new THREE.CylinderGeometry(0.03, 0.03, 0.4, 16);
        const stemMaterial = new THREE.MeshStandardMaterial({ color: 0x4a2511 });
        const stem = new THREE.Mesh(stemGeometry, stemMaterial);
        stem.position.y = 0.8;
        
        const leafGeometry = new THREE.SphereGeometry(0.15, 16, 16);
        leafGeometry.scale(1.5, 0.5, 0.8);
        const leafMaterial = new THREE.MeshStandardMaterial({ color: 0x228b22 });
        const leaf = new THREE.Mesh(leafGeometry, leafMaterial);
        leaf.position.set(0.1, 0.9, 0);
        leaf.rotation.z = Math.PI / 6;
        
        appleGroup.add(apple, stem, leaf);
        appleGroup.position.set(-4, 3, 2);
        appleGroup.userData.foodType = 'apple';
        scene.add(appleGroup);
        foodItems.push(appleGroup);
        foodPhysics.push({ velocity: new THREE.Vector3(0, 0, 0), mass: 1, dragging: false });

        // Create Banana
        const bananaGroup = new THREE.Group();

        // 2. Define the Curve (Slightly adjusted for a better arch)
        const bananaCurve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, 0, 0),
            new THREE.Vector3(0.3, 0.1, 0),      // Slight arch up
            new THREE.Vector3(0.6, 0.2, 0),      // Peak
            new THREE.Vector3(0.9, 0.1, 0),
            new THREE.Vector3(1.2, 0, 0)
        ]);

        // 3. Create Geometry
        // Note: '5' radial segments creates the "ridges" of a banana
        const tubularSegments = 64;
        const radialSegments = 5; 
        const radius = 0.2;
        const bananaGeometry = new THREE.TubeGeometry(bananaCurve, tubularSegments, radius, radialSegments, false);

        // 4. MANIPULATE GEOMETRY: Tapering & Coloring
        const count = bananaGeometry.attributes.position.count;
        const pos = bananaGeometry.attributes.position;
        const colors = [];
        const colorYellow = new THREE.Color(0xffeb3b);
        const colorGreen = new THREE.Color(0x6e9c30); // Stem
        const colorBrown = new THREE.Color(0x3d2817); // Tip

        // Loop through all vertices to modify shape and color
        for (let i = 0; i < count; i++) {
            // Calculate 'u' - how far along the tube we are (0.0 to 1.0)
            // In TubeGeometry, vertices are organized in rings.
            // Example: if i is near 0, we are at the start (stem).
            
            const ringIndex = Math.floor(i / (radialSegments + 1));
            const u = ringIndex / tubularSegments;

            // --- TAPERING LOGIC ---
            // We use Math.sin(u * PI) to make it thick in middle (1.0) and thin at ends (0.0)
            // We add a small base value (+0.2) so the ends don't disappear completely
            const scale = Math.sin(u * Math.PI) * 0.8 + 0.2;

            // We need to scale the vertex relative to the spine of the curve.
            // This is a simplification: we verify the offset from the curve point.
            // Since TubeGeometry works locally, we can roughly scale x/y/z relative to the curve center roughly.
            // For a robust taper, we usually regenerate, but for this hack, we can manipulate the geometry "thickness" param theoretically, 
            // or easier: simply accept the TubeGeometry uniformness but modify the ENDS colors, 
            // OR use a simple radius scaling approach if we constructed it manually.
            
            // Let's stick to the COLOR logic here to ensure it works easily, 
            // and rely on the curve for shape. 
            // (Note: Full tapering via vertex manipulation is complex math for a snippet).
            
            // --- COLOR LOGIC ---
            if (u < 0.1) {
                // Stem (Green)
                colors.push(colorGreen.r, colorGreen.g, colorGreen.b);
            } else if (u > 0.9) {
                // Tip (Brown)
                colors.push(colorBrown.r, colorBrown.g, colorBrown.b);
            } else {
                // Body (Yellow)
                colors.push(colorYellow.r, colorYellow.g, colorYellow.b);
            }
        }

        // Apply colors to geometry
        bananaGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        // 5. Material
        const bananaMaterial = new THREE.MeshStandardMaterial({ 
            vertexColors: true, // IMPORTANT: Tells material to use our custom colors
            roughness: 0.6,
            flatShading: true   // IMPORTANT: Makes the ridges look sharp/low-poly organic
        });

        const banana = new THREE.Mesh(bananaGeometry, bananaMaterial);

        // 6. Final Scale Tweak (Simple Taper Hack)
        // Since manual vertex tapering is complex math, we cheat by scaling the mesh itself 
        // to be slightly thinner on the Z axis if needed, but the 5 segments do most of the work.
        banana.scale.set(1, 1, 0.8); 

        banana.castShadow = true;
        bananaGroup.add(banana);

        // 7. Positioning (Same as your code)
        bananaGroup.position.set(4, 4, -1);
        bananaGroup.rotation.z = Math.PI / 4; // Angle it nicely
        bananaGroup.userData.foodType = 'banana';

        scene.add(bananaGroup);
        foodItems.push(bananaGroup);
        foodPhysics.push({ velocity: new THREE.Vector3(0, 0, 0), mass: 1, dragging: false });

        // Create Orange
        const orangeGroup = new THREE.Group();
        const orangeGeometry = new THREE.SphereGeometry(0.65, 64, 64);
        const orangeMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xff9800, 
            roughness: 0.8
        });
        const orange = new THREE.Mesh(orangeGeometry, orangeMaterial);
        orange.castShadow = true;
        orangeGroup.add(orange);
        orangeGroup.position.set(-2, 5, -3);
        orangeGroup.userData.foodType = 'orange';
        scene.add(orangeGroup);
        foodItems.push(orangeGroup);
        foodPhysics.push({ velocity: new THREE.Vector3(0, 0, 0), mass: 1, dragging: false });

        // Create Burger
        const burgerGroup = new THREE.Group();
        const bunTopGeometry = new THREE.SphereGeometry(0.8, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
        const bunMaterial = new THREE.MeshStandardMaterial({ color: 0xdaa520, roughness: 0.6 });
        const bunTop = new THREE.Mesh(bunTopGeometry, bunMaterial);
        bunTop.position.y = 0.5;
        bunTop.castShadow = true;
        
        const pattyGeometry = new THREE.CylinderGeometry(0.75, 0.75, 0.2, 32);
        const pattyMaterial = new THREE.MeshStandardMaterial({ color: 0x4a2511, roughness: 0.7 });
        const patty = new THREE.Mesh(pattyGeometry, pattyMaterial);
        patty.position.y = 0.15;
        patty.castShadow = true;
        
        const cheeseGeometry = new THREE.CylinderGeometry(0.8, 0.8, 0.05, 32);
        const cheeseMaterial = new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.4 });
        const cheese = new THREE.Mesh(cheeseGeometry, cheeseMaterial);
        cheese.position.y = 0.3;
        
        const bunBottomGeometry = new THREE.CylinderGeometry(0.8, 0.8, 0.2, 32);
        const bunBottom = new THREE.Mesh(bunBottomGeometry, bunMaterial);
        bunBottom.position.y = 0;
        bunBottom.castShadow = true;
        
        burgerGroup.add(bunTop, patty, cheese, bunBottom);
        burgerGroup.position.set(2, 4, 3);
        burgerGroup.userData.foodType = 'burger';
        scene.add(burgerGroup);
        foodItems.push(burgerGroup);
        foodPhysics.push({ velocity: new THREE.Vector3(0, 0, 0), mass: 1.5, dragging: false });

        // Create Pizza
const pizzaGroup = new THREE.Group();

// 1. The Cheese Base (Improved Shape)
const pizzaShape = new THREE.Shape();
// We use absarc to draw the slice from the center (0,0) easily
pizzaShape.moveTo(0, 0);
pizzaShape.absarc(0, 0, 1.5, 0, Math.PI / 3, false); // The curve
pizzaShape.lineTo(0, 0); // Back to tip

// Enable bevel to make the cheese look soft/melted
const pizzaGeometry = new THREE.ExtrudeGeometry(pizzaShape, { 
    depth: 0.1, 
    bevelEnabled: true, 
    bevelThickness: 0.05, 
    bevelSize: 0.05, 
    bevelSegments: 2 
});

const pizzaMaterial = new THREE.MeshStandardMaterial({ 
    color: 0xffd700, // Gold/Cheese color
    roughness: 0.5,
    metalness: 0.1
});
const pizza = new THREE.Mesh(pizzaGeometry, pizzaMaterial);
pizza.rotation.x = -Math.PI / 2; // Lay flat
pizza.castShadow = true;
pizzaGroup.add(pizza);

// 2. The Crust (New Addition)
// A Torus (donut) segment matches the arc of the pizza perfectly
const crustGeometry = new THREE.TorusGeometry(1.5, 0.15, 8, 16, Math.PI / 3); 
const crustMaterial = new THREE.MeshStandardMaterial({ color: 0xcd853f }); // Bread color
const crust = new THREE.Mesh(crustGeometry, crustMaterial);

// Align crust with the pizza slice
crust.rotation.x = -Math.PI / 2; 
crust.position.y = 0.05; // Sit slightly higher than the cheese
pizzaGroup.add(crust);



pizzaGroup.position.set(0, 5, 4);
pizzaGroup.userData.foodType = 'pizza';
scene.add(pizzaGroup);
foodItems.push(pizzaGroup);
foodPhysics.push({ velocity: new THREE.Vector3(0, 0, 0), mass: 1.2, dragging: false });

        // Create Salad
        const saladGroup = new THREE.Group();
        const bowlGeometry = new THREE.SphereGeometry(0.7, 32, 32, 0, Math.PI * 2, 0, Math.PI / 1.5);
        const bowlMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            roughness: 0.2, 
            side: THREE.DoubleSide 
        });
        const bowl = new THREE.Mesh(bowlGeometry, bowlMaterial);
        bowl.castShadow = true;
        
        const lettuceGeometry = new THREE.SphereGeometry(0.3, 16, 16);
        const lettuceMaterial = new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.8 });
        for (let i = 0; i < 5; i++) {
            const lettuce = new THREE.Mesh(lettuceGeometry, lettuceMaterial);
            const angle = (i / 5) * Math.PI * 2;
            lettuce.position.set(Math.cos(angle) * 0.3, 0.4, Math.sin(angle) * 0.3);
            lettuce.scale.set(0.8 + Math.random() * 0.4, 0.6, 0.8 + Math.random() * 0.4);
            saladGroup.add(lettuce);
        }
        
        saladGroup.add(bowl);
        saladGroup.position.set(-4, 4, -2);
        saladGroup.userData.foodType = 'salad';
        scene.add(saladGroup);
        foodItems.push(saladGroup);
        foodPhysics.push({ velocity: new THREE.Vector3(0, 0, 0), mass: 1, dragging: false });

        // Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let draggedObject = null;
        let dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        let dragOffset = new THREE.Vector3();

        function onMouseDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(foodItems, true);

            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while (obj.parent && !foodItems.includes(obj)) {
                    obj = obj.parent;
                }
                if (foodItems.includes(obj)) {
                    draggedObject = obj;
                    const idx = foodItems.indexOf(draggedObject);
                    foodPhysics[idx].dragging = true;
                    foodPhysics[idx].velocity.set(0, 0, 0);
                    
                    const planeNormal = new THREE.Vector3(0, 0, 1);
                    planeNormal.applyQuaternion(camera.quaternion);
                    dragPlane.setFromNormalAndCoplanarPoint(planeNormal, draggedObject.position);
                    
                    const intersection = new THREE.Vector3();
                    raycaster.ray.intersectPlane(dragPlane, intersection);
                    dragOffset.copy(draggedObject.position).sub(intersection);
                }
            }
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if (draggedObject) {
                raycaster.setFromCamera(mouse, camera);
                const intersection = new THREE.Vector3();
                raycaster.ray.intersectPlane(dragPlane, intersection);
                draggedObject.position.copy(intersection.add(dragOffset));
            }
        }

        function onMouseUp() {
            if (draggedObject) {
                const idx = foodItems.indexOf(draggedObject);
                foodPhysics[idx].dragging = false;
                
                const distToPlate = draggedObject.position.distanceTo(new THREE.Vector3(0, 0, 0));
                if (distToPlate < 3 && draggedObject.position.y < 2) {
                    const foodType = draggedObject.userData.foodType;
                    showNutrition(foodType);
                    
                    draggedObject.position.y = 0.5;
                    draggedObject.position.x = Math.max(-2, Math.min(2, draggedObject.position.x));
                    draggedObject.position.z = Math.max(-2, Math.min(2, draggedObject.position.z));
                }
                
                draggedObject = null;
            }
        }

        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);

        // Animation
        function animate() {
            requestAnimationFrame(animate);

            foodItems.forEach((food, idx) => {
                const physics = foodPhysics[idx];
                
                if (!physics.dragging) {
                    physics.velocity.y -= 0.015 * physics.mass;
                    food.position.add(physics.velocity);
                    
                    if (food.position.y < 0.5) {
                        food.position.y = 0.5;
                        physics.velocity.y *= -0.4;
                        physics.velocity.x *= 0.8;
                        physics.velocity.z *= 0.8;
                        
                        if (Math.abs(physics.velocity.y) < 0.01) {
                            physics.velocity.y = 0;
                        }
                    }
                    
                    if (food.position.y > 0.5) {
                        food.rotation.x += physics.velocity.length() * 0.1;
                        food.rotation.z += physics.velocity.length() * 0.05;
                    }
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
